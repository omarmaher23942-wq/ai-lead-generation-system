<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lead Generation System</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  :root {
    --neon: #00ffe7;
    --neon2: #ff2d78;
    --neon3: #7b2fff;
    --bg: #020408;
    --card: rgba(0,255,231,0.03);
    --border: rgba(0,255,231,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.4;
  }

  .content {
    position: relative;
    z-index: 10;
    padding: 40px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 60px;
  }

  .logo-text {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 8px;
    color: var(--neon);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeDown 1s forwards 0.3s;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(32px, 6vw, 72px);
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--neon) 50%, var(--neon3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    animation: fadeDown 1s forwards 0.5s;
  }

  .subtitle {
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    margin-top: 15px;
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeDown 1s forwards 0.7s;
  }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 50px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    text-align: center;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.4s;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon), transparent);
    animation: scanline 3s linear infinite;
  }

  .stat-card:hover {
    border-color: var(--neon);
    transform: translateY(-5px);
    box-shadow: 0 0 40px rgba(0,255,231,0.15);
  }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 52px;
    font-weight: 900;
    color: var(--neon);
    line-height: 1;
    text-shadow: 0 0 30px rgba(0,255,231,0.5);
  }

  .stat-label {
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* RUN BUTTON */
  .btn-container {
    display: flex;
    justify-content: center;
    margin-bottom: 60px;
  }

  #run-btn {
    position: relative;
    padding: 22px 70px;
    font-family: 'Orbitron', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--bg);
    background: linear-gradient(135deg, var(--neon), var(--neon3));
    border: none;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s;
    text-transform: uppercase;
    box-shadow: 0 0 40px rgba(0,255,231,0.3), 0 0 80px rgba(0,255,231,0.1);
  }

  #run-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
    transform: rotate(45deg) translateX(-100%);
    transition: transform 0.6s;
  }

  #run-btn:hover::before {
    transform: rotate(45deg) translateX(100%);
  }

  #run-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 60px rgba(0,255,231,0.5), 0 0 120px rgba(0,255,231,0.2);
  }

  #run-btn:active { transform: scale(0.97); }

  #run-btn.loading {
    pointer-events: none;
    opacity: 0.7;
  }

  /* STATUS */
  #status {
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--neon);
    margin-bottom: 40px;
    min-height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #status.visible { opacity: 1; }

  /* TABLE */
  .table-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    max-width: 1400px;
    margin: 0 auto;
    opacity: 0;
    transform: translateY(40px);
  }

  .table-header {
    padding: 25px 30px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .table-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--neon);
    text-transform: uppercase;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 10px var(--neon);
    animation: pulse 2s infinite;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    padding: 15px 20px;
    text-align: left;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 18px 20px;
    border-bottom: 1px solid rgba(0,255,231,0.05);
    font-size: 15px;
    color: rgba(255,255,255,0.8);
    transition: all 0.3s;
  }

  tr { transition: all 0.3s; }

  tr:hover td {
    background: rgba(0,255,231,0.03);
    color: #fff;
  }

  .email-badge {
    background: rgba(0,255,231,0.1);
    border: 1px solid rgba(0,255,231,0.3);
    color: var(--neon);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-family: monospace;
  }

  .website-link {
    color: var(--neon3);
    text-decoration: none;
    font-size: 13px;
  }

  .website-link:hover { color: var(--neon); }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes scanline {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .row-animate {
    animation: rowIn 0.5s forwards;
  }

  /* SPINNER */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="content">
  <header>
    <div class="logo-text">⚡ Autonomous Intelligence System</div>
    <h1>AI LEAD<br>GENERATION</h1>
    <div class="subtitle">POWERED BY GPT-4o · HUNTER.IO · FASTAPI</div>
  </header>

  <div class="stats-grid">
    <div class="stat-card" id="card1">
      <div class="stat-num" id="total-leads">0</div>
      <div class="stat-label">Total Leads</div>
    </div>
    <div class="stat-card" id="card2">
      <div class="stat-num" id="total-emails">0</div>
      <div class="stat-label">Emails Found</div>
    </div>
    <div class="stat-card" id="card3">
      <div class="stat-num" id="total-companies">0</div>
      <div class="stat-label">Companies</div>
    </div>
  </div>

  <div class="btn-container">
    <button id="run-btn" onclick="runSystem()">
      ⚡ GENERATE NEW LEADS
    </button>
  </div>

  <div id="status"></div>

  <div class="table-container" id="table-container">
    <div class="table-header">
      <div class="dot"></div>
      <div class="table-title">Live Lead Database</div>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Website</th>
          <th>Role</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="leads-body"></tbody>
    </table>
  </div>
</div>

<script>
// THREE.JS BACKGROUND
const canvas = document.getElementById('bg-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 30;

const particles = new THREE.BufferGeometry();
const count = 3000;
const positions = new Float32Array(count * 3);

for (let i = 0; i < count * 3; i++) {
  positions[i] = (Math.random() - 0.5) * 100;
}

particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const material = new THREE.PointsMaterial({
  color: 0x00ffe7,
  size: 0.15,
  transparent: true,
  opacity: 0.6
});

const mesh = new THREE.Points(particles, material);
scene.add(mesh);

function animateBg() {
  requestAnimationFrame(animateBg);
  mesh.rotation.y += 0.0005;
  mesh.rotation.x += 0.0002;
  renderer.render(scene, camera);
}
animateBg();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// GSAP ANIMATIONS ON LOAD
gsap.to('#card1', { opacity: 1, y: 0, duration: 0.8, delay: 0.8 });
gsap.to('#card2', { opacity: 1, y: 0, duration: 0.8, delay: 1.0 });
gsap.to('#card3', { opacity: 1, y: 0, duration: 0.8, delay: 1.2 });
gsap.to('#table-container', { opacity: 1, y: 0, duration: 0.8, delay: 1.4 });

// COUNTER ANIMATION
function animateCounter(el, target) {
  let current = 0;
  const step = Math.max(1, Math.floor(target / 30));
  const interval = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current;
    if (current >= target) clearInterval(interval);
  }, 40);
}

// LOAD LEADS
async function loadLeads() {
  const res = await fetch('/leads');
  const leads = await res.json();

  animateCounter(document.getElementById('total-leads'), leads.length);
  animateCounter(document.getElementById('total-emails'), leads.filter(l => l.email !== 'N/A').length);
  animateCounter(document.getElementById('total-companies'), new Set(leads.map(l => l.website)).size);

  const tbody = document.getElementById('leads-body');
  tbody.innerHTML = '';

  leads.forEach((lead, i) => {
    const desc = lead.description || '';
    const position = desc.split(' at ')[0] || 'N/A';
    const row = document.createElement('tr');
    row.className = 'row-animate';
    row.style.animationDelay = `${i * 0.05}s`;
    row.innerHTML = `
      <td style="color:rgba(255,255,255,0.2);font-family:monospace">${String(i+1).padStart(2,'0')}</td>
      <td><strong>${lead.name}</strong></td>
      <td><span class="email-badge">${lead.email}</span></td>
      <td style="color:rgba(255,255,255,0.4)">${lead.phone}</td>
      <td><a class="website-link" href="${lead.website}" target="_blank">${lead.website.replace('https://','').replace('www.','')}</a></td>
      <td style="color:rgba(255,255,255,0.5);font-size:13px">${position}</td>
      <td style="color:rgba(255,255,255,0.3);font-size:12px">${lead.date?.split(' ')[0] || ''}</td>
    `;
    tbody.appendChild(row);
  });
}

// RUN SYSTEM
async function runSystem() {
  const btn = document.getElementById('run-btn');
  const status = document.getElementById('status');

  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span> SCANNING TARGETS...';
  status.textContent = '⚡ AI SYSTEM INITIALIZING...';
  status.classList.add('visible');

  const messages = [
    '🔍 SCRAPING BUSINESS DATA...',
    '📧 HUNTING EMAILS...',
    '🤖 AI ANALYZING COMPANIES...',
    '✍️ WRITING PERSONALIZED EMAILS...',
    '💾 SAVING TO DATABASE...'
  ];

  let i = 0;
  const msgInterval = setInterval(() => {
    if (i < messages.length) {
      status.textContent = messages[i++];
    }
  }, 4000);

  try {
    const res = await fetch('/run', { method: 'POST' });
    const data = await res.json();
    clearInterval(msgInterval);

    status.textContent = `✅ MISSION COMPLETE — ${data.new_leads} NEW LEADS ACQUIRED`;

    gsap.fromTo('#table-container',
      { scale: 0.98, opacity: 0.5 },
      { scale: 1, opacity: 1, duration: 0.5 }
    );

    await loadLeads();
  } catch(e) {
    clearInterval(msgInterval);
    status.textContent = '❌ CONNECTION ERROR — RETRY';
  }

  btn.classList.remove('loading');
  btn.innerHTML = '⚡ GENERATE NEW LEADS';
}

loadLeads();
</script>
</body>
</html>
